<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huecos - Gestión de Inventario</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #333;
            text-align: center;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }
        /* Estilo para las pestañas (Tabs) */
        .tabs {
            display: flex;
            margin-bottom: 20px;
        }
        .tab-button {
            flex-grow: 1;
            padding: 10px 15px;
            cursor: pointer;
            border: none;
            background-color: #eee;
            border-bottom: 3px solid transparent;
            font-size: 16px;
            transition: all 0.3s;
        }
        .tab-button.active {
            background-color: #007bff;
            color: white;
            border-bottom: 3px solid #0056b3;
        }
        .tab-content {
            padding: 20px;
            border: 1px solid #ddd;
            border-top: none;
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input[type="text"], textarea, select {
            width: 98%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea {
            height: 200px;
            resize: vertical;
        }
        button {
            background-color: #28a745;
            color: white;
            padding: 12px 20px;
            margin-top: 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #218838;
        }
        #message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .loading { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gestión de Huecos</h1>

        <div class="tabs">
            <button class="tab-button active" onclick="openTab(event, 'Carga')">1. Carga de Datos</button>
            <button class="tab-button" onclick="openTab(event, 'Reporte')">2. Generar Reporte PDF</button>
        </div>

        <div id="Carga" class="tab-content active">
            <h2>Cargar Datos de Scaneo</h2>
        

            <label for="fechaCarga">Fecha del Scaneo:</label>
            <input type="text" id="fechaCarga" placeholder="DD-MM-YYYY">

            <label for="datosRaw">Datos a Pegar (Columna 1: Código, Columna 2: Cantidad)</label>
            <textarea id="datosRaw" placeholder="Ej: 12345678;2\n98765432;1"></textarea>

            <button onclick="cargarDatos()">Cargar y Enriquecer Datos</button>
        </div>

        <div id="Reporte" class="tab-content">
            <h2>Generar Reporte de Huecos (PDF)</h2>
            <p>Seleccione la fecha y el pasillo para generar el reporte en PDF.</p>

            <label for="fechaReporte">Fecha del Reporte:</label>
            <input type="text" id="fechaReporte" placeholder="DD-MM-YYYY">

            <label for="pasillo">Pasillo:</label>
            <select id="pasillo">
                <option value="">Todos los pasillos</option>
                <option>GALLETITAS Y GOLOSINAS</option>
                <option>PERFUMERIA</option>
                <option>PAPELES</option>
                <option>QUIMICOS</option>
                <option>MASCOTAS</option>
                <option>JABON EN POLVO Y SUAVIZANTES</option>
                <option>PERECEDEROS</option>
                <option>PAÑALES</option>
                <option>CHECKOUT</option>
                <option>HARINAS Y ACEITES</option>
                <option>FIDEOS</option>
                <option>DESAYUNO</option>
                <option>ARROZ Y ADEREZOS</option>
                <option>CEREALES Y MERMELADAS</option>
                <option>CELIACO</option>
                <option>BEBIDAS</option>
            </select>

            <button onclick="generarPDF()">Generar Reporte PDF</button>
        </div>

        <div id="message" class="loading" style="display: none;"></div>

    </div>
    
    <script src="script.js"></script>
    <script>
        // Lógica de pestañas (Tabs)
        function openTab(evt, tabName) {
            let i, tabcontent, tablinks;

            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }

            tablinks = document.getElementsByClassName("tab-button");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }

            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.className += " active";
        }

        // Abrir la primera pestaña por defecto al cargar
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelector('.tab-button').click();
        });
    </script>
</body>
</html>
