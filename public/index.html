<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Huecos en Góndola</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Sistema de Huecos en Góndola</h1>
            <nav>
                <button id="btn-cargar" class="nav-btn active">Cargar Datos</button>
                <button id="btn-resumen" class="nav-btn">Ver Resumen</button>
                <button id="btn-reporte" class="nav-btn">Generar Reporte</button>
            </nav>
        </header>

        <main>
            <!-- Sección Cargar Datos -->
            <section id="seccion-cargar" class="seccion-activa">
                <h2>Cargar Datos</h2>
                <div class="form-group">
                    <label for="fecha">Fecha:</label>
                    <input type="date" id="fecha">
                </div>
                <div class="form-group">
                    <label for="texto">Datos a cargar:</label>
                    <textarea id="texto" placeholder="Pega la información aquí..."></textarea>
                </div>
                <!-- CAMBIO: Quitar onclick y usar id -->
                <button id="btn-cargar-datos">Cargar</button>
                <div id="status"></div>
            </section>

            <!-- Las otras secciones se mantienen igual -->
            <section id="seccion-resumen" class="seccion-oculta">
                <!-- ... contenido del resumen ... -->
            </section>

            <section id="seccion-reporte" class="seccion-oculta">
                <!-- ... contenido del reporte ... -->
            </section>
        </main>
    </div>

    <!-- IMPORTANTE: Cargar el script al final del body -->
    <script src="script.js"></script>
</body>
</html>
