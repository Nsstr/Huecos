<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Huecos en Góndola</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Sistema de Huecos en Góndola</h1>
            <nav>
                <button id="btn-cargar" class="nav-btn active">Cargar Datos</button>
                <button id="btn-resumen" class="nav-btn">Ver Resumen</button>
                <button id="btn-reporte" class="nav-btn">Generar Reporte</button>
            </nav>
        </header>

        <main>
            <!-- Sección Cargar Datos -->
            <section id="seccion-cargar" class="seccion-activa">
                <h2>Cargar Datos</h2>
                <div class="form-group">
                    <label for="fecha">Fecha:</label>
                    <input type="date" id="fecha">
                </div>
                <div class="form-group">
                    <label for="texto">Datos a cargar:</label>
                    <textarea id="texto" placeholder="Pega la información aquí..."></textarea>
                </div>
                <button id="btn-cargar-datos" onclick="cargarDatos()">Cargar</button>
                <div id="status"></div>
            </section>

            <!-- Sección Resumen -->
            <section id="seccion-resumen" class="seccion-oculta">
                <h2>Resumen de Huecos</h2>
                <div class="header-row">
                    <div class="date-selector">
                        <label for="fecha-resumen">Fecha:</label>
                        <input type="date" id="fecha-resumen">
                        <button onclick="cargarResumen()">Actualizar</button>
                    </div>
                </div>
                <div id="resumen-contenido">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Seleccione una fecha y presione "Actualizar" para ver el resumen</p>
                    </div>
                </div>
            </section>

            <!-- Sección Reporte -->
            <section id="seccion-reporte" class="seccion-oculta">
                <h2>Generar Reporte PDF</h2>
                <div class="form-group">
                    <label for="fecha-reporte">Fecha (DD-MM-YYYY):</label>
                    <input type="text" id="fecha-reporte" placeholder="DD-MM-YYYY">
                </div>
                <div class="form-group">
                    <label for="pasillo">Pasillo:</label>
                    <select id="pasillo">
                        <option value="">Todos los pasillos</option>
                        <option>GALLETITAS Y GOLOSINAS</option>
                        <option>PERFUMERIA</option>
                        <option>PAPELES</option>
                        <option>QUIMICOS</option>
                        <option>MASCOTAS</option>
                        <option>JABON EN POLVO Y SUAVIZANTES</option>
                        <option>PERECEDEROS</option>
                        <option>PAÑALES</option>
                        <option>CHECKOUT</option>
                        <option>HARINAS Y ACEITES</option>
                        <option>FIDEOS</option>
                        <option>DESAYUNO</option>
                        <option>ARROZ Y ADEREZOS</option>
                        <option>CEREALES Y MERMELADAS</option>
                        <option>CELIACO</option>
                        <option>BEBIDAS</option>
                    </select>
                </div>
                <button onclick="generarReporte()">Generar PDF</button>
                <div id="progreso-reporte" class="progreso-oculto">
                    Generando PDF, por favor espere...
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
